<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
		<link href="https://fonts.googleapis.com/css2?family=Dosis:wght@600&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Your Assistant :D</title>
  </head>
  <style>
    #judul {
			font-family: 'Dosis', sans-serif;
      color:#4b6b8d;
      margin-top:30px;


      -webkit-animation-name:'animjudul';
      -webkit-animation-duration:2s;


    }
    #subjudul{
      font-family: 'Dosis', sans-serif;
      color:#4b6b8d;

			-webkit-animation-name:'animsubjudul';
      -webkit-animation-duration:4s;


    }
    #btna{
      background-color:#749cbc !important;
      border-color:#4b6b8d !important;
    }
    #btn {
            -webkit-animation-name:'btna';
      -webkit-animation-duration:5s;

    }



    @-webkit-keyframes animsubjudul{
      0%{opacity:0;}
      30%{opacity:0;}
      60%{opacity:0;}
      100%{opacity:1;}
    }
    @-webkit-keyframes animjudul{
      from{margin-top:-20px;}
      to{margin-top:30px;}
    }
    @-webkit-keyframes btna{
      0%{opacity:0;}
      25%{opacity:0;}
      50%{opacity:0;}
      75%{opacity:0;}
      100%{opacity:1;}
    }
  </style>
  <body style="background-color:#fbda9b">




    <div class="container-fluid">


      <div id="judul">
        <p class="mx-auto text-center h1">Hallo, Perkenalkan Aku Virtual Asisten!</p>
      </div>


      <div id="subjudul">
        <p class="mx-auto text-center h5">Silahkan pilih fitur dibawah</p>
      </div>



      <div class="container mt-5" id="btn">
        <div class="row m-1">
        <a href="sahur.html" class="mx-auto btn btn-primary text-white" id="btna"><i class="fa fa-fw fa-clock-o"></i>Jadwal Sahur</a>
        </div>
        <div class="row m-1">
        <a href="buka.html" class="mx-auto btn btn-primary text-white" id="btna"><i class="fa fa-fw fa-clock-o"></i>Jadwal Berbuka</a>
				</div>
      </div>











      <div class="row fixed-bottom">
				<img src="img/1.jpg" class="w-75 h-75 mx-auto">
			</div>





		</div>



    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  </body>
</html>
